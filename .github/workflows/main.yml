name: CI-Pipeline

on:
  push:
    branches:
      - '**'        # Matches all branches (Main, Feature, Hotfix)
  pull_request:
    branches:
      - '**'        # Matches all pull requests

jobs:
  # Sector 1: Go Engine (Internal & CMD)
  go-backend:
    name: Go Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Verify Dependencies
        run: go mod tidy
      - name: Compile Binary
        run: go build -v ./cmd/neuralgrid

  # Sector 2: Python AI & Scripts
  python-scripts:
    name: Python Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Flake8
        run: pip install flake8
      - name: Static Code Analysis
        run: flake8 ./scripts --count --select=E9,F63,F7,F82 --show-source --statistics

  # Sector 3: TSX Interface (UI)
  ui-interface:
    name: UI Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.10'
      - name: Directory Validation
        run: |
          if [ -d "./ui" ]; then
            echo "UI Directory Found. Ready for Frontend Integration."
          else
            echo "Error: UI Directory Missing. Build Terminated."
            exit 1
          fi
