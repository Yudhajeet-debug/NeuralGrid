name: CI-Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # Sector 1: Go Engine
  go-backend:
    name: Go Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Verify Dependencies
        run: go mod tidy
      - name: Compile Binary
        # Updated to match standard Go project layout (builds all in cmd)
        run: go build -v ./cmd/...

  # Sector 2: Python AI & Scripts
  python-scripts:
    name: Python Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Flake8
        run: pip install flake8
      - name: Static Code Analysis
        run: flake8 ./scripts --count --select=E9,F63,F7,F82 --show-source --statistics

  # Sector 3: TSX Interface (UI) - Optimized for pnpm
  ui-interface:
    name: UI Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Current stable version for Node 24
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.10'
          cache: 'pnpm'
          cache-dependency-path: 'ui/pnpm-lock.yaml'

      - name: Directory & Build Validation
        working-directory: ./ui
        run: |
          if [ -f "package.json" ]; then
            echo "pnpm Environment Detected."
            # Uncomment the next line once you have a real pnpm-lock.yaml
            # pnpm install --frozen-lockfile
          else
            echo "Error: package.json missing in ui/ directory."
            exit 1
          fi